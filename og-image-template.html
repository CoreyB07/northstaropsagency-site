<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Northstar Ops Agency OG Image</title>
<style>
  html, body {
    width: 1200px;
    height: 630px;
    margin: 0;
    overflow: hidden;
    font-family: "Inter", "Segoe UI", Arial, sans-serif;
    background:
      radial-gradient(700px 420px at 8% -6%, rgba(91, 226, 255, 0.18), transparent 54%),
      radial-gradient(620px 340px at 95% 5%, rgba(137, 255, 202, 0.15), transparent 52%),
      #030305;
    color: #f3f6fb;
  }

  .canvas {
    position: relative;
    width: 100%;
    height: 100%;
    padding: 64px 72px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }

  .badge {
    align-self: flex-start;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border: 1px solid #20283a;
    border-radius: 999px;
    font-size: 16px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #a9b7d3;
    background: rgba(10, 11, 16, 0.86);
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: linear-gradient(120deg, #5be2ff, #89ffca);
    box-shadow: 0 0 0 8px rgba(91, 226, 255, 0.1);
  }

  h1 {
    margin: 18px 0 0;
    max-width: 860px;
    font-size: 72px;
    line-height: 1.05;
    letter-spacing: -0.03em;
  }

  p {
    margin: 16px 0 0;
    max-width: 920px;
    font-size: 29px;
    line-height: 1.35;
    color: #b8c5df;
  }

  .footer {
    position: absolute;
    left: 72px;
    bottom: 58px;
    font-size: 23px;
    color: #7feaff;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div>
      <div class="badge"><span class="dot"></span>Northstar Ops Agency</div>
      <h1>Digital Operations Partner for Small Business Growth</h1>
      <p>Creative operations, brand systems, and automation designed to improve execution and scalability.</p>
    </div>
    <div class="footer">northstaropsagency.com</div>
  </div>
</body>
</html>
